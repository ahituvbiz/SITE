<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הרכבי תיק IRA | איתן אחיטוב - יועץ פנסיוני</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="אזור לקוחות - הרכבי תיק IRA מוצעים. גישה ללקוחות בלבד.">
  <link rel="icon" href="/assets/favicon.ico">

<style>
/* ============================
   DESIGN TOKENS (מתאים לאתר)
   ============================ */
:root {
  --primary:        #1F4E79;
  --primary-hover:  #163a5e;
  --accent:         #D74E3C;
  --text:           #1A1A2E;
  --text-secondary: #4A4A6A;
  --text-meta:      #6B6B8A;
  --bg-cream:       #F8F6F3;
  --bg-white:       #ffffff;
  --border:         #E4E1DC;
  --positive:       #1a7f44;
  --shadow-sm:      0 1px 3px rgba(0,0,0,.08);
  --shadow-md:      0 4px 16px rgba(0,0,0,.10);
  --shadow-lg:      0 8px 32px rgba(0,0,0,.13);
  --radius:         12px;
  --radius-sm:      8px;
  --transition:     0.2s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: var(--bg-cream);
  color: var(--text);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ============================
   HEADER
   ============================ */
.header {
  background: var(--primary);
  padding: 14px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #fff !important;
  font-size: 18px;
  font-weight: 700;
  text-decoration: none;
}
.logo-sub { font-weight: 400; font-size: 13px; opacity: .75; }

.badge-clients {
  background: rgba(255,255,255,0.15);
  color: #fff;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.25);
}

/* ============================
   GATE (login form)
   ============================ */
#gate-section {
  min-height: calc(100vh - 60px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.gate-card {
  background: var(--bg-white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 48px 40px;
  width: 100%;
  max-width: 440px;
  text-align: center;
}

.gate-icon {
  width: 56px;
  height: 56px;
  background: var(--primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
}

.gate-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

.gate-subtitle {
  font-size: 14px;
  color: var(--text-meta);
  margin-bottom: 32px;
  line-height: 1.6;
}

.form-group {
  margin-bottom: 16px;
  text-align: right;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.form-group input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-family: inherit;
  color: var(--text);
  background: var(--bg-cream);
  transition: border-color var(--transition), box-shadow var(--transition);
  direction: ltr;
  text-align: right;
}

.form-group input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(31,78,121,.12);
  background: #fff;
}

.form-group input::placeholder { color: #bbb; }

.btn-enter {
  width: 100%;
  padding: 14px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  margin-top: 8px;
  transition: background var(--transition), transform var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-enter:hover { background: var(--primary-hover); }
.btn-enter:active { transform: scale(.98); }
.btn-enter:disabled { background: #9db8cf; cursor: not-allowed; }

.error-msg {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #b91c1c;
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 14px;
  margin-top: 16px;
  display: none;
  text-align: right;
}


.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ============================
   CONTENT (after auth)
   ============================ */
#content-section { display: none; }

.content-hero {
  background: var(--primary);
  color: #fff;
  padding: 48px 0 40px;
}

.content-hero .eyebrow {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .08em;
  opacity: .65;
  margin-bottom: 8px;
}

.content-hero h1 {
  font-size: clamp(24px, 4vw, 36px);
  font-weight: 800;
  margin-bottom: 12px;
}

.content-hero .welcome-note {
  font-size: 15px;
  opacity: .8;
  margin-bottom: 0;
}

.content-hero .welcome-name {
  font-weight: 700;
  opacity: 1;
}

.logout-link {
  font-size: 13px;
  color: rgba(255,255,255,.6);
  cursor: pointer;
  margin-top: 16px;
  display: inline-block;
  text-decoration: underline;
}

/* intro note */
.intro-note {
  background: #fff;
  border-right: 4px solid var(--primary);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 16px 20px;
  margin: 32px 0;
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* portfolio cards */
.portfolios-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
  margin: 32px 0;
}

.portfolio-card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  border: 1.5px solid var(--border);
  overflow: hidden;
  transition: box-shadow var(--transition), transform var(--transition);
}

.portfolio-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.portfolio-card-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.portfolio-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 10px;
}

.badge-conservative { background: #dbeafe; color: #1e40af; }
.badge-balanced     { background: #fef3c7; color: #92400e; }
.badge-growth       { background: #dcfce7; color: #166534; }

.portfolio-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}

.portfolio-desc {
  font-size: 13px;
  color: var(--text-meta);
}

.portfolio-card-body { padding: 16px 20px 20px; }

.allocation-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.allocation-table th {
  text-align: right;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text-meta);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.allocation-table td {
  padding: 8px 0;
  border-bottom: 1px solid #f0ede8;
  vertical-align: middle;
}

.allocation-table tr:last-child td { border-bottom: none; }

.alloc-name { color: var(--text); font-weight: 500; }
.alloc-ticker {
  color: var(--text-meta);
  font-size: 12px;
  font-family: monospace;
  margin-top: 2px;
}

.alloc-pct {
  font-weight: 700;
  font-size: 15px;
  color: var(--primary);
  text-align: left;
  direction: ltr;
}

.alloc-bar-wrap {
  width: 100%;
  height: 4px;
  background: #f0ede8;
  border-radius: 2px;
  margin-top: 4px;
}

.alloc-bar {
  height: 4px;
  border-radius: 2px;
  background: var(--primary);
  opacity: .5;
}

.portfolio-total {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1.5px solid var(--border);
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
}

/* notes section */
.notes-section {
  background: #fff;
  border-radius: var(--radius);
  padding: 28px;
  margin: 32px 0;
  box-shadow: var(--shadow-sm);
  border: 1.5px solid var(--border);
}

.notes-section h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text);
}

.notes-section ul {
  padding-right: 20px;
  color: var(--text-secondary);
  font-size: 15px;
  line-height: 1.8;
}

.notes-section li { margin-bottom: 6px; }

/* disclaimer */
.disclaimer {
  background: #fafaf9;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  font-size: 13px;
  color: var(--text-meta);
  line-height: 1.7;
  margin: 32px 0 48px;
}

/* footer */
.footer-simple {
  background: var(--primary);
  color: rgba(255,255,255,.6);
  text-align: center;
  padding: 24px;
  font-size: 13px;
}

.footer-simple a { color: rgba(255,255,255,.8); }

/* ============================
   FUND DETAIL BLOCKS
   ============================ */
.portfolios-grid {
  grid-template-columns: 1fr;
}

.fund-block {
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 14px;
  overflow: hidden;
}

.fund-block-header {
  background: var(--bg-cream);
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}

.fund-block-name {
  font-weight: 700;
  font-size: 14px;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 3px;
}

.fund-block-ticker {
  font-size: 12px;
  color: var(--text-meta);
  font-family: 'Courier New', monospace;
}

.fund-block-pct {
  font-size: 24px;
  font-weight: 800;
  color: var(--primary);
  white-space: nowrap;
  flex-shrink: 0;
}

.fund-meta { padding: 4px 16px 12px; }

.fund-meta-row {
  display: flex;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid #f0ede8;
  font-size: 13.5px;
  align-items: flex-start;
}

.fund-meta-row:last-child { border-bottom: none; }

.fund-meta-label {
  color: var(--text-meta);
  min-width: 130px;
  flex-shrink: 0;
  padding-top: 2px;
  font-size: 12.5px;
}

.fund-meta-value {
  color: var(--text);
  font-weight: 500;
  line-height: 1.5;
}

.tag {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.tag-green  { background: #dcfce7; color: #166534; }
.tag-red    { background: #fee2e2; color: #991b1b; }
.tag-blue   { background: #dbeafe; color: #1e40af; }
.tag-yellow { background: #fef9c3; color: #854d0e; }

.fund-link {
  font-size: 13px;
  color: var(--primary);
  text-decoration: underline;
  text-underline-offset: 3px;
}

.split-bar-track {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
  border-radius: 6px;
  overflow: hidden;
  height: 7px;
  margin-bottom: 7px;
}

.split-bar-labels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  font-size: 11px;
  color: var(--text-meta);
  margin-bottom: 14px;
}

.badge-israeli  { background: #dbeafe; color: #1e40af; }
.badge-american { background: #fef3c7; color: #92400e; }

.new-fund-note {
  background: #fef9c3;
  border: 1px solid #fde68a;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 12px;
  color: #92400e;
  margin: 0 16px 12px;
  line-height: 1.5;
}

/* CHART SECTIONS */
.chart-section { padding: 14px 16px 8px; border-top: 1px dashed #e5e2dc; margin-top: 4px; }
.chart-block-title { font-size: 10.5px; font-weight: 700; color: var(--text-meta); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px; }
.chart-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.chart-label { text-align: right; color: var(--text); flex-shrink: 0; font-size: 11.5px; min-width: 118px; }
.chart-track { flex: 1; background: #eee9e4; border-radius: 3px; height: 10px; overflow: hidden; }
.chart-fill { height: 100%; border-radius: 3px; }
.chart-pct { min-width: 38px; text-align: left; color: var(--text-meta); font-size: 11px; font-weight: 600; }
.chart-footnote { font-size: 10.5px; color: var(--text-meta); margin-top: 10px; padding-top: 8px; border-top: 1px solid #f0ede8; text-align: center; }
.pfic-note { background: #f0fdf4; border: 1px solid #86efac; border-radius: 6px; padding: 10px 14px; margin: 12px 16px 6px; font-size: 12.5px; color: #166534; line-height: 1.55; }
/* PIE CHARTS */
.pie-section { padding: 16px 16px 8px; border-top: 1px dashed #e5e2dc; margin-top: 4px; }
.pie-note { font-size: 10.5px; color: var(--text-meta); text-align: center; margin-bottom: 14px; }
.pie-charts-row { display: flex; gap: 24px; }
.pie-chart-block { flex: 1; min-width: 0; }
.pie-subtitle { font-size: 10px; font-weight: 700; color: var(--text-meta); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; margin-bottom: 10px; }
.pie-donut { width: 130px; height: 130px; border-radius: 50%; margin: 0 auto 12px; position: relative; }
.pie-donut::after { content: ''; position: absolute; inset: 30px; border-radius: 50%; background: white; }
.pie-legend { display: flex; flex-direction: column; gap: 3px; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; }
.leg-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
.leg-label { flex: 1; color: var(--text); }
.leg-pct { color: var(--text-meta); font-weight: 600; font-size: 10.5px; white-space: nowrap; }
/* ============================
   TABS
   ============================ */
.tab-bar {
  background: var(--primary);
  border-top: 1px solid rgba(255,255,255,.15);
}
.tab-bar-inner {
  display: flex;
  gap: 4px;
  padding: 0;
}
.tab-btn {
  background: transparent;
  border: none;
  color: rgba(255,255,255,.65);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  padding: 12px 20px;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
}
.tab-btn:hover  { color: #fff; }
.tab-btn.tab-active {
  color: #fff;
  border-bottom-color: #fff;
}
.tab-panel { display: none; }
.tab-panel.tab-panel-active { display: block; }

/* responsive */
@media (max-width: 480px) {
  .gate-card { padding: 32px 24px; }
  .portfolios-grid { grid-template-columns: 1fr; }
  .fund-meta-label { min-width: 100px; }
  .tab-btn { padding: 10px 14px; font-size: 13px; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="container header-inner">
    <a href="/" class="logo">
      <svg width="32" height="32" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="9" fill="rgba(255,255,255,0.15)"/>
        <path d="M20 7 V 28" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <path d="M9 13 L 31 13" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <rect x="6" y="20" width="3" height="6" fill="#D74E3C" rx="1"/>
        <rect x="11" y="17" width="3" height="9" fill="#fff" rx="1"/>
        <rect x="26" y="14" width="3" height="12" fill="#fff" rx="1"/>
        <rect x="31" y="10" width="3" height="16" fill="#D74E3C" rx="1"/>
      </svg>
      <span>אחיטוב <span class="logo-sub">תכנון פיננסי | יועץ פנסיוני</span></span>
    </a>
    <span class="badge-clients">🔒 אזור לקוחות</span>
  </div>
</header>

<!-- ========================
     GATE SECTION
     ======================== -->
<section id="gate-section">
  <div class="gate-card">
    <div class="gate-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1 class="gate-title">כניסה לאזור לקוחות</h1>
    <p class="gate-subtitle">הזן את כתובת המייל ומספר הטלפון שלך<br>או של בן/ת הזוג שלך</p>

    <form id="auth-form" novalidate>
      <div class="form-group">
        <label for="email-input">כתובת מייל</label>
        <input
          type="email"
          id="email-input"
          placeholder="your@email.com"
          autocomplete="email"
          inputmode="email"
          required
        >
      </div>
      <div class="form-group">
        <label for="phone-input">טלפון נייד</label>
        <input
          type="tel"
          id="phone-input"
          placeholder="052-000-0000"
          autocomplete="tel"
          inputmode="tel"
          required
        >
      </div>
      <button type="submit" id="submit-btn" class="btn-enter">
        <span id="btn-text">כניסה</span>
      </button>
    </form>

    <div class="error-msg" id="error-msg"></div>
  </div>
</section>

<!-- ========================
     CONTENT SECTION
     ======================== -->
<section id="content-section" style="display:none">
  <div id="content-header-bar"></div>
  <div id="tab-panels"></div>
</section><!-- /content-section -->

<!-- Footer -->
<footer class="footer-simple" id="content-footer" style="display:none">
  © 2026 איתן אחיטוב | <a href="/">pensya.info</a> | <a href="tel:+972527700599">052-770-0599</a>
</footer>

<script src="/clients/gate.js?v=12"></script>

</body>
</html>
